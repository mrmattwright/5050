<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>50/50 — Cards Test</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@300;400;600&family=Special+Elite&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/eras.css">
  <link rel="stylesheet" href="../css/cards.css">
  <link rel="stylesheet" href="../css/responsive.css">

  <style>
    /* Override initial hidden state so cards are visible without scroll animations */
    .track-card {
      opacity: 1 !important;
      transform: none !important;
    }
    .era--80s .track-card {
      transform: rotate(-1.5deg) !important;
    }
    .era--80s .track-card:nth-child(even) {
      transform: rotate(1deg) !important;
    }
    .era__header {
      opacity: 1 !important;
      transform: none !important;
    }
    .era__silhouette {
      opacity: 0.35 !important;
    }
  </style>
</head>
<body>

  <!-- CRT Scanline Overlay -->
  <div class="crt-overlay" aria-hidden="true"></div>

  <!-- Film Grain -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- SIDE A — 80s -->
  <section class="era era--80s in-view" data-era="80s" id="era-80s">
    <div class="era__silhouette era__silhouette--right" aria-hidden="true">
      <!-- Vinyl Record + Sleeve -->
      <svg viewBox="0 0 500 500" fill="none" stroke="#ff2d95" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="30" y="60" width="340" height="340" rx="4" opacity="0.25" fill="#ff2d95" fill-opacity="0.02"/>
        <rect x="30" y="60" width="340" height="340" rx="4" opacity="0.4"/>
        <circle cx="310" cy="250" r="175" opacity="0.5" stroke-width="2"/>
        <circle cx="310" cy="250" r="168" opacity="0.2"/>
        <circle cx="310" cy="250" r="160" opacity="0.12" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="150" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="140" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="130" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="120" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="110" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="100" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="90" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="80" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="70" opacity="0.1" stroke-dasharray="2 3"/>
        <circle cx="310" cy="250" r="55" opacity="0.4" stroke-width="1.5"/>
        <circle cx="310" cy="250" r="52" opacity="0.15" fill="#ff2d95" fill-opacity="0.04"/>
        <line x1="280" y1="238" x2="340" y2="238" opacity="0.25"/>
        <line x1="288" y1="248" x2="332" y2="248" opacity="0.2"/>
        <line x1="293" y1="258" x2="327" y2="258" opacity="0.15"/>
        <circle cx="310" cy="250" r="4" opacity="0.7" fill="#ff2d95" fill-opacity="0.15"/>
        <circle cx="310" cy="250" r="60" opacity="0.2"/>
      </svg>
    </div>
    <div class="era__header">
      <span class="era__year-range">1980–1989</span>
      <h2 class="era__name">Side A</h2>
      <span class="era__tagline">Vinyl</span>
    </div>
    <div class="era__tracks" id="tracks-80s"></div>
  </section>

  <script src="../js/data.js"></script>
  <script>
    (function () {
      'use strict';

      const SPOTIFY_ICON = `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;

      // Render just the first 4 tracks (80s era)
      const container = document.getElementById('tracks-80s');
      const tracks80s = TRACKS.filter(t => t.era === '80s').slice(0, 4);

      tracks80s.forEach((track, index) => {
        const card = document.createElement('div');
        card.className = 'track-card in-view';
        card.setAttribute('data-index', index);

        card.innerHTML = `
          <div class="track-card__inner">
            <div class="track-card__front">
              ${track.imageUrl
                ? `<img class="track-card__image" src="${track.imageUrl}" alt="${track.title} by ${track.artist}" loading="lazy">`
                : `<div class="track-card__image" style="background: linear-gradient(135deg, var(--era-accent), var(--midnight));"></div>`
              }
              <span class="track-card__year-badge">${track.year}</span>
              <div class="track-card__info">
                <div class="track-card__title">${track.title}</div>
                <div class="track-card__artist">${track.artist}</div>
              </div>
            </div>
            <div class="track-card__back">
              <div class="track-card__back-title">${track.title}</div>
              <div class="track-card__back-artist">${track.artist}</div>
              <p class="track-card__message">${track.message}</p>
              <a href="${track.spotifyUrl}" target="_blank" rel="noopener" class="track-card__spotify-link" onclick="event.stopPropagation()">
                ${SPOTIFY_ICON} Play on Spotify
              </a>
            </div>
          </div>
        `;

        // Mobile tap to flip
        card.addEventListener('click', function (e) {
          if (window.matchMedia('(hover: none)').matches) {
            document.querySelectorAll('.track-card.flipped').forEach(c => {
              if (c !== card) c.classList.remove('flipped');
            });
            card.classList.toggle('flipped');
          }
        });

        container.appendChild(card);
      });
    })();
  </script>

</body>
</html>
