<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" fill="none" stroke="#ff2d95" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Technics SL-1200 — the icon -->
  <!-- Base / housing -->
  <rect x="10" y="40" width="480" height="360" rx="8" opacity="0.7" stroke-width="2"/>
  <rect x="18" y="48" width="464" height="344" rx="5" opacity="0.3"/>
  <!-- Rubber feet -->
  <circle cx="35" cy="390" r="8" opacity="0.4" fill="#ff2d95" fill-opacity="0.1"/>
  <circle cx="465" cy="390" r="8" opacity="0.4" fill="#ff2d95" fill-opacity="0.1"/>
  <circle cx="35" cy="55" r="8" opacity="0.4" fill="#ff2d95" fill-opacity="0.1"/>
  <circle cx="465" cy="55" r="8" opacity="0.4" fill="#ff2d95" fill-opacity="0.1"/>
  <!-- Platter — the big circle -->
  <circle cx="210" cy="230" r="145" opacity="0.6" stroke-width="2"/>
  <circle cx="210" cy="230" r="140" opacity="0.3"/>
  <!-- Strobe dots around platter edge -->
  <circle cx="210" cy="86" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="282" cy="96" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="340" cy="136" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="368" cy="195" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="355" cy="268" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="310" cy="325" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="248" cy="358" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="172" cy="358" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="110" cy="325" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="65" cy="268" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="52" cy="195" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="80" cy="136" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <circle cx="138" cy="96" r="1.5" opacity="0.5" fill="#ff2d95"/>
  <!-- Record on platter — grooves -->
  <circle cx="210" cy="230" r="125" opacity="0.15"/>
  <circle cx="210" cy="230" r="118" opacity="0.08" stroke-dasharray="1 2"/>
  <circle cx="210" cy="230" r="111" opacity="0.08" stroke-dasharray="1 2"/>
  <circle cx="210" cy="230" r="104" opacity="0.08" stroke-dasharray="1 2"/>
  <circle cx="210" cy="230" r="97" opacity="0.08" stroke-dasharray="1 2"/>
  <circle cx="210" cy="230" r="90" opacity="0.08" stroke-dasharray="1 2"/>
  <circle cx="210" cy="230" r="83" opacity="0.08" stroke-dasharray="1 2"/>
  <circle cx="210" cy="230" r="76" opacity="0.08" stroke-dasharray="1 2"/>
  <circle cx="210" cy="230" r="69" opacity="0.08" stroke-dasharray="1 2"/>
  <circle cx="210" cy="230" r="62" opacity="0.08" stroke-dasharray="1 2"/>
  <!-- Label -->
  <circle cx="210" cy="230" r="42" opacity="0.35"/>
  <circle cx="210" cy="230" r="38" opacity="0.15" fill="#ff2d95" fill-opacity="0.05"/>
  <!-- Spindle -->
  <circle cx="210" cy="230" r="4" opacity="0.8" fill="#ff2d95" fill-opacity="0.3"/>
  <!-- Label text lines -->
  <line x1="190" y1="220" x2="230" y2="220" opacity="0.2"/>
  <line x1="195" y1="228" x2="225" y2="228" opacity="0.15"/>
  <line x1="198" y1="236" x2="222" y2="236" opacity="0.1"/>
  <!-- ═══ TONE ARM ASSEMBLY ═══ -->
  <!-- Tone arm rest / clip -->
  <rect x="410" y="72" width="20" height="8" rx="3" opacity="0.4"/>
  <!-- Tone arm base / gimbal -->
  <circle cx="430" cy="115" r="18" opacity="0.6"/>
  <circle cx="430" cy="115" r="12" opacity="0.3"/>
  <circle cx="430" cy="115" r="5" opacity="0.5" fill="#ff2d95" fill-opacity="0.1"/>
  <!-- Counterweight -->
  <circle cx="460" cy="115" r="10" opacity="0.4"/>
  <!-- Tone arm tube -->
  <line x1="430" y1="115" x2="418" y2="108" opacity="0.6" stroke-width="2"/>
  <line x1="418" y1="108" x2="290" y2="195" opacity="0.5" stroke-width="1.8"/>
  <!-- Headshell -->
  <rect x="275" y="190" width="22" height="12" rx="2" opacity="0.6" transform="rotate(-40 286 196)"/>
  <!-- Cartridge -->
  <rect x="268" y="196" width="10" height="6" rx="1" opacity="0.5" transform="rotate(-40 273 199)"/>
  <!-- Stylus hint -->
  <line x1="266" y1="202" x2="262" y2="206" opacity="0.7" stroke-width="0.8"/>
  <!-- ═══ PITCH CONTROL ═══ -->
  <rect x="400" y="180" width="55" height="170" rx="6" opacity="0.35"/>
  <!-- Pitch slider track -->
  <line x1="428" y1="200" x2="428" y2="330" opacity="0.3"/>
  <!-- Pitch slider knob -->
  <rect x="418" y="255" width="20" height="16" rx="3" opacity="0.5" fill="#ff2d95" fill-opacity="0.08"/>
  <!-- Pitch % markings -->
  <line x1="440" y1="210" x2="448" y2="210" opacity="0.15"/>
  <line x1="440" y1="230" x2="448" y2="230" opacity="0.15"/>
  <line x1="440" y1="265" x2="450" y2="265" opacity="0.25"/>
  <line x1="440" y1="300" x2="448" y2="300" opacity="0.15"/>
  <line x1="440" y1="320" x2="448" y2="320" opacity="0.15"/>
  <!-- ═══ CONTROLS ═══ -->
  <!-- Start/Stop button -->
  <circle cx="420" cy="370" r="12" opacity="0.5" stroke-width="1.5"/>
  <circle cx="420" cy="370" r="8" opacity="0.3" fill="#ff2d95" fill-opacity="0.05"/>
  <!-- 33 / 45 RPM buttons -->
  <rect x="50" y="360" width="28" height="14" rx="4" opacity="0.35"/>
  <rect x="85" y="360" width="28" height="14" rx="4" opacity="0.35"/>
  <!-- RPM labels -->
  <line x1="56" y1="367" x2="72" y2="367" opacity="0.15"/>
  <line x1="91" y1="367" x2="107" y2="367" opacity="0.15"/>
  <!-- Power light -->
  <circle cx="42" cy="60" r="3" opacity="0.6" fill="#ff2d95" fill-opacity="0.3"/>
  <!-- Target light -->
  <rect x="375" y="62" width="18" height="6" rx="2" opacity="0.3"/>
  <!-- "TECHNICS" text area -->
  <line x1="155" y1="62" x2="265" y2="62" opacity="0.15" stroke-width="0.8"/>
</svg>
